name: replaykids
description: Plataforma de roupas e produtos infantis de segunda mão do Litoral do Paraná.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navegação
  go_router: ^14.0.0

  # Injeção de dependência
  auto_injector: ^2.0.0

  # Requisições HTTP
  dio: ^5.4.0

  # Salvar token JWT localmente
  shared_preferences: ^2.2.0

  # Gerência de estado
  signals_flutter: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true